<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>அருள்மிகு ஶ்ரீ ரென்னியம்மாள் ஶ்ரீ மாசாண கருப்பசாமி கோவில்</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  color:white;
  min-height:100vh;
}

/* Background */
.bg{
  position:fixed;
  inset:0;
  background: radial-gradient(circle at top, #ffcc70, #000000 70%);
  z-index:-2;
}

.glow{
  position:fixed;
  inset:0;
  background: linear-gradient(to bottom, rgba(255,140,0,0.35), rgba(0,0,0,0.9));
  z-index:-1;
}

/* Bell */
.bell{
  position:fixed;
  top:10px;
  right:10px;
  font-size:40px;
  animation:shake 0.8s infinite;
  z-index:10;
}

@keyframes shake{
  0%{transform:rotate(0deg);}
  20%{transform:rotate(15deg);}
  40%{transform:rotate(-15deg);}
  60%{transform:rotate(10deg);}
  80%{transform:rotate(-10deg);}
  100%{transform:rotate(0deg);}
}

/* Header */
header{
  text-align:center;
  padding:15px;
  background:rgba(255,87,34,0.85);
  font-weight:600;
}

/* Hero */
.hero{
  text-align:center;
  padding:25px;
}
.hero h2{
  background:rgba(0,0,0,0.5);
  display:inline-block;
  padding:10px 20px;
  border-radius:12px;
}

/* 🖼️ GOD IMAGE ZOOM EFFECT (NEW FIX) */
.god-img{
  display:flex;
  justify-content:center;
  margin-top:15px;
}

.god-img img{
  width:210px;
  height:250px;
  object-fit:cover;
  border-radius:20px;
  border:3px solid gold;
  box-shadow:0 0 20px gold;

  /* 🌟 SLOW ZOOM ANIMATION */
  animation:zoomIn 4s ease-in-out infinite alternate;
}

@keyframes zoomIn{
  0%{
    transform:scale(0.95);
  }
  100%{
    transform:scale(1.05);
  }
}

/* diya */
.diya{
  text-align:center;
  font-size:50px;
  margin-top:10px;
}

/* Card */
.card{
  width:90%;
  max-width:600px;
  margin:15px auto;
  padding:20px;
  background:rgba(255,255,255,0.12);
  border-radius:15px;
  backdrop-filter:blur(10px);
}

/* Floating buttons */
.floating{
  position:fixed;
  bottom:15px;
  right:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
  z-index:999;
}

.floating a{
  width:50px;
  height:50px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  text-decoration:none;
  font-size:22px;
}

.call{background:green;}
.wp{background:#25D366;}

/* Play button FIXED */
.playbtn{
  position:fixed;
  bottom:90px;
  left:15px;
  padding:10px 15px;
  background:orange;
  color:white;
  border:none;
  border-radius:25px;
  font-size:14px;
  z-index:1000;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="glow"></div>

<div class="bell">🔔</div>

<header>
🙏 அருள்மிகு ஶ்ரீ ரென்னியம்மாள் ஶ்ரீ மாசாண கருப்பசாமி கோவில் 🙏
</header>

<div class="hero">
<h2>🙏 பக்தர்களை வரவேற்கிறோம் 🙏</h2>
</div>

<!-- 🖼️ IMAGE (ZOOM ADDED) -->
<div class="god-img">
  <img src="./karuppasamy.jpg" alt="Karuppasamy">
</div>

<div class="diya">🪔</div>

<!-- POOJA -->
<div class="card">
<h3>🕉️ பூஜை நேரம்</h3>
<p>🌕 பௌர்ணமி பூஜை: காலை 10:00 AM</p>
</div>

<!-- ABOUT -->
<div class="card">
<h3>கோவில் பற்றி</h3>
<p>அருள்மிகு ஶ்ரீ ரென்னியம்மாள் & ஶ்ரீ மாசாண கருப்பசாமி தலம்.</p>
</div>

<!-- CONTACT -->
<div class="card">
<h3>📞 தொடர்பு</h3>
<p>+91 6382971718</p>
</div>

<!-- FLOATING -->
<div class="floating">
  <a class="call" href="tel:+916382971718">📞</a>
  <a class="wp" href="https://wa.me/916382971718" target="_blank">💬</a>
</div>

<!-- SONG -->
<audio id="bgmusic" loop>
  <source src="./karuppasamy.mp3" type="audio/mpeg">
</audio>

<!-- PLAY BUTTON -->
<button class="playbtn" onclick="document.getElementById('bgmusic').play()">
🎶 Play Song
</button>

</body>
</html>
