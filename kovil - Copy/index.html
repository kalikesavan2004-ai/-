<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>அருள்மிகு ஶ்ரீ ரென்னியம்மாள் ஶ்ரீ மாசாண கருப்பசாமி</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  color:white;
  min-height:100vh;
  overflow-x:hidden;
}

/* 🌄 Background */
.bg{
  position:fixed;
  inset:0;
  background: radial-gradient(circle at top, #ffcc70, #000000 70%);
  z-index:-3;
}

.glow{
  position:fixed;
  inset:0;
  background: linear-gradient(to bottom, rgba(255,140,0,0.35), rgba(0,0,0,0.9));
  z-index:-2;
}

/* 🔔 Bell */
.bell{
  position:fixed;
  top:10px;
  right:10px;
  font-size:40px;
  animation:shake 0.8s infinite;
  filter: drop-shadow(0 0 10px gold);
}

@keyframes shake{
  0%{transform:rotate(0deg);}
  20%{transform:rotate(15deg);}
  40%{transform:rotate(-15deg);}
  60%{transform:rotate(10deg);}
  80%{transform:rotate(-10deg);}
  100%{transform:rotate(0deg);}
}

/* 🛕 Temple entrance */
.container{
  animation:fadeIn 2s ease-in-out;
}

@keyframes fadeIn{
  from{opacity:0; transform:scale(0.95);}
  to{opacity:1; transform:scale(1);}
}

/* Header */
header{
  text-align:center;
  padding:15px;
  background:rgba(255,87,34,0.85);
  font-weight:600;
}

/* Hero */
.hero{
  text-align:center;
  padding:30px 20px;
}
.hero h2{
  background:rgba(0,0,0,0.5);
  display:inline-block;
  padding:10px 20px;
  border-radius:12px;
}

/* 🖼️ GOD IMAGE */
.god-img{
  display:flex;
  justify-content:center;
  margin-top:20px;
}

.god-img img{
  width:220px;
  height:260px;
  object-fit:cover;
  border-radius:20px;
  border:3px solid gold;
  box-shadow:0 0 25px gold;
}

/* 🪔 diya */
.diya{
  text-align:center;
  font-size:50px;
  animation:flicker 1.2s infinite alternate;
}

@keyframes flicker{
  0%{opacity:0.6; transform:scale(1);}
  100%{opacity:1; transform:scale(1.15);}
}

/* Card */
.card{
  width:90%;
  max-width:600px;
  margin:15px auto;
  padding:20px;
  background:rgba(255,255,255,0.12);
  border-radius:15px;
  backdrop-filter:blur(10px);
}

/* Quote */
.quote{
  text-align:center;
  color:#ffd27f;
  margin:10px;
}

/* Floating */
.floating{
  position:fixed;
  bottom:15px;
  right:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.floating a{
  width:45px;
  height:45px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  text-decoration:none;
}
.call{background:green;}
.wp{background:#25D366;}
</style>
</head>

<body>

<div class="bg"></div>
<div class="glow"></div>

<div class="bell">🔔</div>

<div class="container">

<header>
🙏 அருள்மிகு ஶ்ரீ ரென்னியம்மாள் ஶ்ரீ மாசாண கருப்பசாமி 🙏
</header>

<div class="hero">
<h2>🙏 பக்தர்களுக்கு வரவேற்கிறோம் 🙏</h2>
</div>

<div class="god-img">
  <!-- 🛕 KARUPPASAMY IMAGE -->
  <img src="./karuppasamy.jpg" alt="Karuppasamy">
</div>

<div class="diya">🪔</div>

<div class="quote">
"கருப்பசாமி துணை இருந்தால் எல்லாம் சாத்தியம்"
</div>

<div class="card">
<h3>கோவில் பற்றி</h3>
<p>அருள்மிகு ஶ்ரீ ரென்னியம்மாள் ஶ்ரீ மாசாண கருப்பசாமி.</p>
</div>

<div class="card">
<h3>🌕 பௌர்ணமி பூஜை</h3>
<p>காலை 10:00 AM</p>
</div>

<div class="card">
<h3>📞 தொடர்பு</h3>
<p>6382971718</p>
</div>

<div class="floating">
<a class="call" href="tel:6382971718">📞</a>
<a class="wp" href="https://wa.me/916382971718">💬</a>
</div>

</div>

<!-- 🎶 SONG -->
<audio id="bgmusic" loop>
  <source src="./karuppasamy.mp3" type="audio/mpeg">
</audio>

<button onclick="document.getElementById('bgmusic').play()" 
style="position:fixed;bottom:80px;right:15px;padding:10px;background:orange;color:white;border:none;border-radius:20px;">
🎶 Play Song
</button>
</script>

</body>
</html>
